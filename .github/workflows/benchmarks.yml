name: Benchmarks

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr:
        description: Pull request number
        required: true
        type: number
      suite:
        description: Benchmark suite (default, sync, hot-write, full)
        required: false
        default: default
        type: string

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  bench:
    if: |
      (github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        startsWith(github.event.comment.body, '/bench') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
      ) || (github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-22.04
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    concurrency:
      group: bench-${{ github.event.issue.number || inputs.pr }}
      cancel-in-progress: true
    env:
      EM_VERSION: 4.0.21
      EM_CACHE_FOLDER: emsdk-cache
      PLAYWRIGHT_BROWSERS_PATH: /home/runner/.cache/ms-playwright
      BENCH_BASE_DB: treecrdt_bench_base
      BENCH_HEAD_DB: treecrdt_bench_head

    steps:
      - name: Resolve PR details
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.eventName === 'workflow_dispatch'
              ? Number(context.payload.inputs?.pr ?? '')
              : context.payload.issue?.number;

            if (!prNumber) {
              throw new Error('Unable to determine pull request number');
            }

            const { owner, repo } = context.repo;
            const pr = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });

            core.setOutput('number', String(prNumber));
            core.setOutput('base_sha', pr.data.base.sha);
            core.setOutput('head_sha', pr.data.head.sha);
            core.setOutput('base_ref', pr.data.base.ref);
            core.setOutput('head_ref', pr.data.head.ref);
            core.setOutput('head_repo', pr.data.head.repo.full_name);

            const sameRepo = pr.data.head.repo.full_name === `${owner}/${repo}`;
            core.setOutput('same_repo', sameRepo ? 'true' : 'false');

      - name: Comment when skipped for fork
        if: steps.pr.outputs.same_repo != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- TREECRDT_BENCHMARKS -->';
            const { owner, repo } = context.repo;
            const prNumber = Number('${{ steps.pr.outputs.number }}');

            const body = [
              marker,
              '## Benchmarks',
              '',
              'Benchmarks were skipped because the head branch comes from a fork. We only run `/bench` on same-repo branches for security.',
              '',
            ].join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const existing = comments.find((c) => typeof c.body === 'string' && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body,
              });
            }

      - name: Parse benchmark request
        if: steps.pr.outputs.same_repo == 'true'
        id: request
        uses: actions/github-script@v7
        with:
          script: |
            const rawRequest = context.eventName === 'workflow_dispatch'
              ? String(context.payload.inputs?.suite ?? 'default')
              : String(context.payload.comment?.body ?? '/bench');

            const requestedToken = (() => {
              if (context.eventName === 'workflow_dispatch') {
                return rawRequest.trim().toLowerCase() || 'default';
              }
              const match = rawRequest.trim().match(/^\/bench(?:\s+([A-Za-z0-9_-]+))?/i);
              return match?.[1]?.trim().toLowerCase() ?? 'default';
            })();

            const aliases = new Map([
              ['default', 'default'],
              ['smoke', 'default'],
              ['sync', 'sync'],
              ['local-sync', 'sync'],
              ['hot', 'hot-write'],
              ['write', 'hot-write'],
              ['hot-write', 'hot-write'],
              ['full', 'full'],
              ['all', 'full'],
            ]);

            const suite = aliases.get(requestedToken);
            if (!suite) {
              throw new Error(
                `Unknown benchmark suite "${requestedToken}". Supported suites: default, sync, hot-write, full.`
              );
            }

            const suiteLabels = {
              default: 'high-value default',
              sync: 'scoped sync focus',
              'hot-write': 'hot-write focus',
              full: 'full legacy suite',
            };

            const triggerLabel =
              context.eventName === 'workflow_dispatch'
                ? `workflow_dispatch (${suite})`
                : requestedToken === 'default'
                  ? '/bench'
                  : `/bench ${requestedToken}`;

            core.setOutput('suite', suite);
            core.setOutput('suite_label', suiteLabels[suite]);
            core.setOutput('trigger_label', triggerLabel);
            core.setOutput('needs_emscripten', suite === 'full' ? 'true' : 'false');
            core.setOutput('needs_playwright', suite === 'full' ? 'true' : 'false');

      - name: Checkout base
        if: steps.pr.outputs.same_repo == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.base_sha }}
          path: bench-base
          fetch-depth: 0
          submodules: recursive

      - name: Checkout head
        if: steps.pr.outputs.same_repo == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head_sha }}
          path: bench-head
          fetch-depth: 0
          submodules: recursive

      - name: Use Node.js 20.x
        if: steps.pr.outputs.same_repo == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install pnpm
        if: steps.pr.outputs.same_repo == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Install Rust toolchain
        if: steps.pr.outputs.same_repo == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Add wasm targets
        if: steps.pr.outputs.same_repo == 'true'
        run: |
          rustup target add wasm32-unknown-unknown
          if [ '${{ steps.request.outputs.needs_emscripten }}' = 'true' ]; then
            rustup target add wasm32-unknown-emscripten
          fi

      - name: Install wasm-pack
        if: steps.pr.outputs.same_repo == 'true'
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Cache Emscripten
        if: steps.pr.outputs.same_repo == 'true' && steps.request.outputs.needs_emscripten == 'true'
        uses: actions/cache@v4
        with:
          path: ${{ env.EM_CACHE_FOLDER }}
          key: ${{ env.EM_VERSION }}-${{ runner.os }}-bench

      - name: Setup Emscripten
        if: steps.pr.outputs.same_repo == 'true' && steps.request.outputs.needs_emscripten == 'true'
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ env.EM_VERSION }}
          actions-cache-folder: ${{ env.EM_CACHE_FOLDER }}

      - name: Verify emcc
        if: steps.pr.outputs.same_repo == 'true' && steps.request.outputs.needs_emscripten == 'true'
        run: emcc -v

      - name: Install dependencies (base)
        if: steps.pr.outputs.same_repo == 'true'
        working-directory: bench-base
        run: pnpm install --frozen-lockfile=false

      - name: Build benchmark TypeScript deps (base)
        if: steps.pr.outputs.same_repo == 'true'
        working-directory: bench-base
        env:
          BENCH_SUITE: ${{ steps.request.outputs.suite }}
        run: |
          pnpm -C packages/treecrdt-ts run build
          pnpm -C packages/treecrdt-riblt-wasm-js run build
          pnpm -C packages/sync/protocol run build
          pnpm -C packages/sync/material/sqlite run build
          pnpm -C packages/sync/material/postgres run build
          pnpm -C packages/sync/server/core run build
          pnpm -C packages/treecrdt-auth run build
          pnpm -C packages/treecrdt-crypto run build
          if [ "$BENCH_SUITE" = "full" ]; then
            pnpm -C packages/treecrdt-sqlite-conformance run build
            pnpm -C packages/treecrdt-wa-sqlite run build:ts
            pnpm -C packages/treecrdt-wa-sqlite/e2e run build:wa-sqlite
          fi

      - name: Install dependencies (head)
        if: steps.pr.outputs.same_repo == 'true'
        working-directory: bench-head
        run: pnpm install --frozen-lockfile=false

      - name: Build benchmark TypeScript deps (head)
        if: steps.pr.outputs.same_repo == 'true'
        working-directory: bench-head
        env:
          BENCH_SUITE: ${{ steps.request.outputs.suite }}
        run: |
          pnpm -C packages/treecrdt-ts run build
          pnpm -C packages/treecrdt-riblt-wasm-js run build
          pnpm -C packages/sync/protocol run build
          pnpm -C packages/sync/material/sqlite run build
          pnpm -C packages/sync/material/postgres run build
          pnpm -C packages/sync/server/core run build
          pnpm -C packages/treecrdt-auth run build
          pnpm -C packages/treecrdt-crypto run build
          if [ "$BENCH_SUITE" = "full" ]; then
            pnpm -C packages/treecrdt-sqlite-conformance run build
            pnpm -C packages/treecrdt-wa-sqlite run build:ts
            pnpm -C packages/treecrdt-wa-sqlite/e2e run build:wa-sqlite
          fi

      - name: Install Playwright browsers
        if: steps.pr.outputs.same_repo == 'true' && steps.request.outputs.needs_playwright == 'true'
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
        run: pnpm -C bench-head/packages/treecrdt-wa-sqlite/e2e exec playwright install --with-deps chromium

      - name: Prepare benchmark Postgres databases
        if: steps.pr.outputs.same_repo == 'true'
        env:
          PGHOST: 127.0.0.1
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
          BENCH_BASE_DB: ${{ env.BENCH_BASE_DB }}
          BENCH_HEAD_DB: ${{ env.BENCH_HEAD_DB }}
        run: |
          pnpm -C bench-head/packages/sync/server/postgres-node exec node <<'EOF'
          const { Client } = require('pg');

          async function recreateDatabase(name) {
            const client = new Client({ database: 'postgres' });
            await client.connect();
            try {
              await client.query(`DROP DATABASE IF EXISTS "${name}" WITH (FORCE)`);
              await client.query(`CREATE DATABASE "${name}"`);
            } finally {
              await client.end();
            }
          }

          (async () => {
            await recreateDatabase(process.env.BENCH_BASE_DB);
            await recreateDatabase(process.env.BENCH_HEAD_DB);
          })().catch((err) => {
            console.error(err);
            process.exit(1);
          });
          EOF

      - name: Run benchmarks (base)
        if: steps.pr.outputs.same_repo == 'true'
        working-directory: bench-base
        env:
          BENCH_SUITE: ${{ steps.request.outputs.suite }}
          PLAYWRIGHT_BROWSERS_PATH: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          TREECRDT_POSTGRES_URL: postgresql://postgres:postgres@127.0.0.1:5432/${{ env.BENCH_BASE_DB }}
        run: |
          has_hot_write_suite() {
            node -e "const p=require('./package.json'); process.exit(p.scripts?.['benchmark:hot-write'] ? 0 : 1)"
          }

          run_hot_write_suite() {
            if ! has_hot_write_suite; then
              echo "Skipping hot-write benchmarks (scripts not present on this branch)"
              return 0
            fi

            pnpm -C packages/treecrdt-sqlite-node run benchmark:hot-write -- "$@"

            if [ -n "$TREECRDT_POSTGRES_URL" ]; then
              pnpm -C packages/treecrdt-postgres-napi run benchmark:hot-write -- "$@"
            else
              echo "Skipping postgres hot-write benchmark (TREECRDT_POSTGRES_URL not set)"
            fi
          }

          case "$BENCH_SUITE" in
            default)
              pnpm run benchmark:sync:local -- \
                --workloads=sync-balanced-children-payloads-cold-start \
                --counts=100000 \
                --first-view \
                --iterations=3 \
                --warmup=1 \
                --server-fixture-cache=rebuild
              run_hot_write_suite \
                --benches=payload-edit,insert-sibling \
                --counts=100000 \
                --writes-per-sample=10 \
                --warmup-writes=2
              ;;
            sync)
              pnpm run benchmark:sync:local -- \
                --workloads=sync-balanced-children-cold-start,sync-balanced-children-payloads-cold-start \
                --counts=10000,100000 \
                --first-view \
                --iterations=3 \
                --warmup=1 \
                --server-fixture-cache=rebuild
              ;;
            hot-write)
              run_hot_write_suite \
                --benches=payload-edit,insert-sibling \
                --counts=10000,100000 \
                --writes-per-sample=10 \
                --warmup-writes=2
              ;;
            full)
              pnpm run benchmark
              pnpm run benchmark:sync:local -- \
                --workloads=sync-balanced-children-payloads-cold-start \
                --counts=100000 \
                --first-view \
                --iterations=3 \
                --warmup=1 \
                --server-fixture-cache=rebuild
              run_hot_write_suite \
                --benches=payload-edit,insert-sibling \
                --counts=100000 \
                --writes-per-sample=10 \
                --warmup-writes=2
              ;;
            *)
              echo "Unknown BENCH_SUITE=$BENCH_SUITE" >&2
              exit 1
              ;;
          esac

          pnpm run benchmark:aggregate

      - name: Run benchmarks (head)
        if: steps.pr.outputs.same_repo == 'true'
        working-directory: bench-head
        env:
          BENCH_SUITE: ${{ steps.request.outputs.suite }}
          PLAYWRIGHT_BROWSERS_PATH: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          TREECRDT_POSTGRES_URL: postgresql://postgres:postgres@127.0.0.1:5432/${{ env.BENCH_HEAD_DB }}
        run: |
          has_hot_write_suite() {
            node -e "const p=require('./package.json'); process.exit(p.scripts?.['benchmark:hot-write'] ? 0 : 1)"
          }

          run_hot_write_suite() {
            if ! has_hot_write_suite; then
              echo "Skipping hot-write benchmarks (scripts not present on this branch)"
              return 0
            fi

            pnpm -C packages/treecrdt-sqlite-node run benchmark:hot-write -- "$@"

            if [ -n "$TREECRDT_POSTGRES_URL" ]; then
              pnpm -C packages/treecrdt-postgres-napi run benchmark:hot-write -- "$@"
            else
              echo "Skipping postgres hot-write benchmark (TREECRDT_POSTGRES_URL not set)"
            fi
          }

          case "$BENCH_SUITE" in
            default)
              pnpm run benchmark:sync:local -- \
                --workloads=sync-balanced-children-payloads-cold-start \
                --counts=100000 \
                --first-view \
                --iterations=3 \
                --warmup=1 \
                --server-fixture-cache=rebuild
              run_hot_write_suite \
                --benches=payload-edit,insert-sibling \
                --counts=100000 \
                --writes-per-sample=10 \
                --warmup-writes=2
              ;;
            sync)
              pnpm run benchmark:sync:local -- \
                --workloads=sync-balanced-children-cold-start,sync-balanced-children-payloads-cold-start \
                --counts=10000,100000 \
                --first-view \
                --iterations=3 \
                --warmup=1 \
                --server-fixture-cache=rebuild
              ;;
            hot-write)
              run_hot_write_suite \
                --benches=payload-edit,insert-sibling \
                --counts=10000,100000 \
                --writes-per-sample=10 \
                --warmup-writes=2
              ;;
            full)
              pnpm run benchmark
              pnpm run benchmark:sync:local -- \
                --workloads=sync-balanced-children-payloads-cold-start \
                --counts=100000 \
                --first-view \
                --iterations=3 \
                --warmup=1 \
                --server-fixture-cache=rebuild
              run_hot_write_suite \
                --benches=payload-edit,insert-sibling \
                --counts=100000 \
                --writes-per-sample=10 \
                --warmup-writes=2
              ;;
            *)
              echo "Unknown BENCH_SUITE=$BENCH_SUITE" >&2
              exit 1
              ;;
          esac

          pnpm run benchmark:aggregate

      - name: Upload benchmark artifacts
        if: steps.pr.outputs.same_repo == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: benchmarks-${{ steps.pr.outputs.number }}-${{ steps.request.outputs.suite }}
          if-no-files-found: warn
          path: |
            bench-base/benchmarks/**
            bench-head/benchmarks/**

      - name: Prepare comment body
        if: steps.pr.outputs.same_repo == 'true'
        id: render
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const fs = require('node:fs');
            const path = require('node:path');

            const marker = '<!-- TREECRDT_BENCHMARKS -->';
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${process.env.GITHUB_RUN_ID}`;

            const baseFile = path.join(process.env.GITHUB_WORKSPACE, 'bench-base/benchmarks/summary.json');
            const headFile = path.join(process.env.GITHUB_WORKSPACE, 'bench-head/benchmarks/summary.json');

            const readSummary = (file) => (fs.existsSync(file) ? JSON.parse(fs.readFileSync(file, 'utf8')) : []);
            const base = readSummary(baseFile);
            const head = readSummary(headFile);

            const keyFor = (row) =>
              `${row.implementation ?? '-'}|${row.storage ?? '-'}|${row.workload ?? row.name ?? '-'}`;

            const mapBase = new Map(base.map((r) => [keyFor(r), r]));
            const mapHead = new Map(head.map((r) => [keyFor(r), r]));
            const keys = Array.from(new Set([...mapBase.keys(), ...mapHead.keys()])).sort();

            const format = (value, digits = 2) =>
              value === null || value === undefined || Number.isNaN(Number(value))
                ? '-'
                : Number(value).toFixed(digits);
            const formatPct = (value) =>
              value === null || value === undefined || Number.isNaN(Number(value))
                ? '-'
                : `${value >= 0 ? '+' : ''}${value.toFixed(2)}%`;

            const severityLevel = (pct) => {
              if (pct === null || pct === undefined || Number.isNaN(pct)) return 0;
              const abs = Math.abs(pct);
              if (abs >= 30) return 3;
              if (abs >= 10) return 2;
              if (abs >= 5) return 1;
              return 0;
            };
            const statusEmoji = (deltaOps, deltaMs) => {
              const level = Math.max(severityLevel(deltaOps), severityLevel(deltaMs));
              return level === 3 ? '🔴' : level === 2 ? '🟠' : level === 1 ? '🟡' : '✅';
            };

            const lines = [];
            lines.push('| Impl | Storage | Workload | Base ops/s | Head ops/s | Δ ops/s | Base p50 ms | Head p50 ms | Δ p50 | Status |');
            lines.push('|---|---|---|---:|---:|---:|---:|---:|---:|---:|');

            let improved = 0;
            let regressed = 0;

            for (const key of keys) {
              const baseRow = mapBase.get(key);
              const headRow = mapHead.get(key);

              const baseOps = baseRow?.opsPerSec ?? null;
              const headOps = headRow?.opsPerSec ?? null;
              const deltaOps =
                baseOps !== null && headOps !== null ? ((headOps - baseOps) / baseOps) * 100 : null;

              if (deltaOps !== null) {
                if (deltaOps > 0) improved += 1;
                else if (deltaOps < 0) regressed += 1;
              }

              const baseMs = baseRow?.durationMs ?? null;
              const headMs = headRow?.durationMs ?? null;
              const deltaMs =
                baseMs !== null && headMs !== null ? ((headMs - baseMs) / baseMs) * 100 : null;

              const [impl, storage, workload] = key.split('|').map((s) => s.trim());
              const status = statusEmoji(deltaOps, deltaMs);
              lines.push(
                `| ${impl} | ${storage} | ${workload} | ${format(baseOps)} | ${format(headOps)} | ${formatPct(deltaOps)} | ${format(baseMs)} | ${format(headMs)} | ${formatPct(deltaMs)} | ${status} |`,
              );
            }

            const baseSha = '${{ steps.pr.outputs.base_sha }}'.slice(0, 7);
            const headSha = '${{ steps.pr.outputs.head_sha }}'.slice(0, 7);
            const baseRef = '${{ steps.pr.outputs.base_ref }}';
            const headRef = '${{ steps.pr.outputs.head_ref }}';
            const triggerLabel = '`' + '${{ steps.request.outputs.trigger_label }}' + '`';
            const suiteLabel = '${{ steps.request.outputs.suite_label }}';
            const suite = '${{ steps.request.outputs.suite }}';

            const parts = [
              marker,
              '## Benchmarks',
              '',
              `Triggered by ${triggerLabel} - Run: ${runUrl}`,
              `Suite: ${suiteLabel} (\`${suite}\`)`,
              `Base: ${baseRef} (${baseSha}) - Head: ${headRef} (${headSha})`,
              `Compared entries: ${keys.length} - Improved: ${improved} - Regressed: ${regressed}`,
              '',
            ];

            if (keys.length === 0) {
              parts.push('_No benchmark results were found. Check the workflow logs for details._', '');
            } else {
              parts.push(lines.join('\n'), '');
              parts.push('**Status:** ✅ &lt;5% change | 🟡 5–10% | 🟠 10–30% | 🔴 &gt;30%', '');
            }

            parts.push(
              'Artifacts:',
              '- base summary: `bench-base/benchmarks/summary.json`',
              '- head summary: `bench-head/benchmarks/summary.json`',
              ''
            );

            return parts.join('\n');

      - name: Comment results
        if: steps.pr.outputs.same_repo == 'true'
        uses: actions/github-script@v7
        env:
          BENCH_BODY: ${{ steps.render.outputs.result }}
        with:
          script: |
            const marker = '<!-- TREECRDT_BENCHMARKS -->';
            const body = process.env.BENCH_BODY;

            const { owner, repo } = context.repo;
            const prNumber = Number('${{ steps.pr.outputs.number }}');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const existing = comments.find((c) => typeof c.body === 'string' && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body,
              });
            }
